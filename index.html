<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現代簡潔留言牆</title>
    <style>
        body { 
            background-color: transparent; 
            margin: 0;
            padding: 0;
            overflow: hidden; 
            /* 指定微軟正黑體，並設定後備字型 */
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .marquee-container {
            position: fixed;
            top: 0; bottom: 0; left: 6%; right: 6%;
            overflow: hidden; 
        }

        .marquee-content {
            display: flex;
            flex-direction: column; 
            gap: 30px;              
            position: absolute;
            width: 100%;
            animation: scrollUp 30s linear infinite; 
        }

        /* 留言氣泡：採用現代化的圓角矩形 */
        .message-item {
            font-size: 44px; 
            font-weight: 700; /* 加粗讓正黑體更醒目 */
            line-height: 1.5;
            padding: 30px 45px;
            border-radius: 20px; 
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            word-wrap: break-word; 
            white-space: normal;
            color: #222;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 顏色循環：使用高對比的清新配色 */
        .message-item:nth-child(4n+1) { 
            background: linear-gradient(135deg, #ffffff 0%, #fff0f0 100%);
            border-left: 10px solid #ff6b6b;
        }
        .message-item:nth-child(4n+2) { 
            background: linear-gradient(135deg, #ffffff 0%, #f0f7ff 100%);
            border-left: 10px solid #4dadff;
        }
        .message-item:nth-child(4n+3) { 
            background: linear-gradient(135deg, #ffffff 0%, #f0fff4 100%);
            border-left: 10px solid #51cf66;
        }
        .message-item:nth-child(4n) { 
            background: linear-gradient(135deg, #ffffff 0%, #fff9f0 100%);
            border-left: 10px solid #fcc419;
        }

        @keyframes scrollUp {
            0% { transform: translateY(100vh); } 
            100% { transform: translateY(-105%); } 
        }
    </style>
</head>
<body>

    <div class="marquee-container">
        <div class="marquee-content" id="displayBoard">
            💬 正在載入留言...
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwbplzkLckWDgruWxAt6RMNu5WBI2k36457bIxgk3iwyI8AGU5MI6qHMh6vb9Vs2nnS/exec";

        async function updateMarquee() {
            try {
                const res = await fetch(API_URL + "?t=" + new Date().getTime());
                const messages = await res.json();
                const displayBoard = document.getElementById('displayBoard');
                
                if (messages && messages.length > 0) {
                    displayBoard.innerHTML = messages.map(msg => `
                        <div class="message-item">${msg}</div>
                    `).join('');
                } else {
                    displayBoard.innerHTML = '<div class="message-item">暫時沒有新留言喔！</div>';
                }
            } catch (error) {
                console.error("更新失敗:", error);
            }
        }

        setInterval(updateMarquee, 30000);
        updateMarquee();
    </script>
</body>
</html>
